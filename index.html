<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BoBowling</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; overscroll-behavior: none; }
  #app { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
  #canvas-container { position: relative; aspect-ratio: 9/16; height: 100%; max-height: 100vh; max-width: 100vw; background: #111; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  #loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #fff; font-size: 18px; z-index: 100; gap: 12px; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #ffd700; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #ff4444; font-size: 16px; z-index: 101; padding: 20px; text-align: center; }
  #error.show { display: flex; }
  #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  #scoreboard { position: absolute; top: 8px; left: 8px; right: 8px; background: rgba(0,0,0,0.85); color: #fff; padding: 6px; border-radius: 8px; font-size: 11px; pointer-events: auto; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); z-index: 60; }
  .frame-row { display: flex; gap: 2px; }
  .frame { flex: 1; background: rgba(255,255,255,0.08); border-radius: 4px; padding: 3px 2px; text-align: center; min-width: 0; }
  .frame.current { background: rgba(255,200,0,0.35); box-shadow: 0 0 8px rgba(255,200,0,0.5); }
  .frame-label { font-size: 9px; opacity: 0.7; line-height: 1; }
  .frame-rolls { display: flex; justify-content: flex-end; gap: 1px; font-size: 10px; min-height: 12px; font-family: 'Courier New', monospace; font-weight: bold; }
  .frame-rolls span { min-width: 11px; display: inline-block; }
  .frame-score { font-size: 12px; font-weight: bold; min-height: 14px; color: #ffd700; }
  .frame.tenth { flex: 1.3; }
  #info { position: absolute; top: 100px; left: 8px; color: #fff; font-size: 13px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 6px; font-weight: 600; border: 1px solid rgba(255,255,255,0.15); }
  #power-meter { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 20px; height: 200px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.5); border-radius: 10px; overflow: hidden; opacity: 0; transition: opacity 0.2s; }
  #power-meter.active { opacity: 1; }
  #power-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #00cc44, #ffcc00, #ff3300); height: 0%; transition: height 0.05s linear; }
  #message { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 48px; font-weight: 900; text-shadow: 0 0 25px rgba(255,215,0,0.9), 3px 3px 6px rgba(0,0,0,0.9); opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; letter-spacing: 3px; z-index: 20; }
  #message.show { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  #frame-over { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 50; backdrop-filter: blur(10px); }
  #frame-over.show { display: flex; }
  #frame-over h1 { font-size: 28px; margin-bottom: 8px; }
  #frame-over .frame-result { font-size: 36px; color: #ffd700; margin-bottom: 8px; font-weight: 900; }
  #frame-over .frame-detail { font-size: 16px; margin-bottom: 20px; opacity: 0.9; }
  #send-result-btn { padding: 16px 40px; font-size: 18px; background: #ffd700; color: #000; border: none; border-radius: 8px; cursor: pointer; pointer-events: auto; font-weight: bold; }
  #send-result-btn:active { transform: scale(0.95); }
  #send-result-btn:disabled { opacity: 0.5; }
  #waiting-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 55; backdrop-filter: blur(5px); font-size: 20px; font-weight: bold; text-align: center; padding: 20px; }
  #waiting-overlay.show { display: flex; }
  #waiting-overlay .sub { font-size: 14px; opacity: 0.7; margin-top: 8px; }
  #camera-settings-btn { position: absolute; bottom: 20px; right: 16px; padding: 10px 14px; background: rgba(153, 51, 255, 0.3); color: #fff; border: 1px solid rgba(153, 51, 255, 0.6); border-radius: 6px; font-size: 12px; pointer-events: auto; backdrop-filter: blur(4px); font-weight: 600; z-index: 15; }
  #camera-settings-btn:active { transform: scale(0.95); }
  #camera-settings-panel { position: absolute; bottom: 60px; right: 16px; width: 220px; background: rgba(0, 0, 0, 0.92); color: #fff; border: 1px solid rgba(153, 51, 255, 0.5); border-radius: 8px; padding: 12px; pointer-events: auto; backdrop-filter: blur(8px); display: none; z-index: 15; font-size: 11px; }
  #camera-settings-panel.show { display: block; }
  #camera-settings-panel h3 { font-size: 13px; margin-bottom: 10px; color: #9933ff; text-align: center; }
  .setting-row { display: flex; flex-direction: column; margin-bottom: 8px; }
  .setting-row label { display: flex; justify-content: space-between; margin-bottom: 3px; opacity: 0.8; }
  .setting-row label span { color: #ffd700; font-weight: bold; font-family: 'Courier New', monospace; }
  .setting-row input[type="range"] { width: 100%; accent-color: #9933ff; height: 4px; }
  .camera-mode-btns { display: flex; gap: 4px; margin-top: 8px; }
  .camera-mode-btns button { flex: 1; padding: 5px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; font-size: 10px; pointer-events: auto; cursor: pointer; }
  .camera-mode-btns button.active { background: rgba(153, 51, 255, 0.5); border-color: #9933ff; }
  .camera-mode-btns button:active { transform: scale(0.95); }
  #instructions { position: absolute; bottom: 20px; left: 16px; color: rgba(255,255,255,0.8); font-size: 12px; text-align: left; pointer-events: none; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 6px; line-height: 1.4; }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
    <div id="loading"><div class="spinner"></div><div>Загрузка...</div></div>
    <div id="error"><div>⚠️ Ошибка загрузки 3D библиотек</div></div>
    <div id="ui">
      <div id="scoreboard"></div>
      <div id="info">Фрейм 1 • Бросок 1</div>
      <div id="power-meter"><div id="power-fill"></div></div>
      <div id="message"></div>
      <button id="camera-settings-btn">📷</button>
      <div id="camera-settings-panel">
        <h3>📷 Настройки камеры</h3>
        <div class="setting-row"><label>Высота <span id="val-height">1.8</span>м</label><input type="range" id="cam-height" min="0.5" max="5" step="0.1" value="1.8"></div>
        <div class="setting-row"><label>Смещение <span id="val-back">-2.5</span>м</label><input type="range" id="cam-back" min="-8" max="2" step="0.1" value="-2.5"></div>
        <div class="setting-row"><label>Наклон <span id="val-tilt">-15</span>°</label><input type="range" id="cam-tilt" min="-30" max="45" step="1" value="-15"></div>
        <div class="setting-row"><label>FOV <span id="val-fov">45</span>°</label><input type="range" id="cam-fov" min="20" max="90" step="1" value="45"></div>
        <div class="camera-mode-btns"><button id="mode-aim" class="active">Прицел</button><button id="mode-roll">Полет</button><button id="mode-lock">Фикс</button></div>
      </div>
      <div id="instructions">👆 ВВЕРХ — сила | ВЛЕВО/ВПРАВО — прицел</div>
    </div>
    <div id="frame-over">
      <h1 id="frame-title">Фрейм завершён!</h1>
      <div class="frame-result" id="frame-result-text">0</div>
      <div class="frame-detail" id="frame-detail-text"></div>
      <button id="send-result-btn">Отправить результат</button>
    </div>
    <div id="waiting-overlay">
      <div class="spinner" style="margin-bottom: 16px;"></div>
      <div id="waiting-text">Ожидание...</div>
      <div class="sub" id="waiting-sub">Сейчас не ваш ход</div>
    </div>
  </div>
</div>

<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
  import * as CANNON from 'https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js';

  if (typeof THREE === 'undefined' || typeof CANNON === 'undefined') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').classList.add('show');
    throw new Error('Libraries failed to load');
  }

  const urlParams = new URLSearchParams(window.location.search);
  const matchUuid = urlParams.get('match_uuid');

  // ==========================================
  // GAME STATE — 1 фрейм
  // ==========================================
  const gameState = {
    rolls: [],
    currentRollInFrame: 0,
    pinsStandingBeforeRoll: 10,
    phase: matchUuid ? 'WAITING' : 'AIMING',
    needsPinReset: true,
    settleTimer: 0,
    rollTimer: 0,
    currentFrame: 0
  };

  // ==========================================
  // INIT
  // ==========================================
  function init() {
    if (matchUuid && window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      gameState.phase = 'AIMING';
      hideWaiting();
      startGame();
    } else if (matchUuid) {
      setTimeout(init, 100);
    } else {
      document.getElementById('loading').style.display = 'none';
      resetPins(); resetBall(); updateScoreboard(); updateInfo();
    }
  }

  function showWaiting(text, sub) {
    document.getElementById('waiting-text').textContent = text;
    document.getElementById('waiting-sub').textContent = sub || '';
    document.getElementById('waiting-overlay').classList.add('show');
  }
  function hideWaiting() {
    document.getElementById('waiting-overlay').classList.remove('show');
  }

  function startGame() {
    hideWaiting();
    document.getElementById('loading').style.display = 'none';
    resetPins(); resetBall(); updateScoreboard(); updateInfo();
  }

  // ==========================================
  // SEND RESULT
  // ==========================================
  function sendResult() {
    if (!matchUuid || !window.Telegram || !window.Telegram.WebApp) return;
    const roll1 = gameState.rolls[0] || 0;
    const roll2 = gameState.rolls[1] || 0;
    const roll3 = gameState.rolls[2] || 0;
    const data = JSON.stringify({
      action: 'submit_frame',
      match_uuid: matchUuid,
      frame_number: 0,
      roll1, roll2, roll3
    });
    window.Telegram.WebApp.sendData(data);
    document.getElementById('send-result-btn').textContent = '✅ Отправлено!';
    document.getElementById('send-result-btn').disabled = true;
    document.getElementById('frame-detail-text').textContent += '\nЗакрывайте приложение...';
  }
  document.getElementById('send-result-btn').addEventListener('click', sendResult);

  // ==========================================
  // 3D SETUP
  // ==========================================
  const LANE_WIDTH = 1.0668;
  const FOUL_TO_HEAD_PIN = 18.288;
  const BALL_RADIUS = 0.109;
  const BALL_MASS = 7.2;
  const PIN_HEIGHT = 0.38;
  const PIN_MASS = 0.75;
  const PIN_SPACING = 0.3048;
  const PIN_ROW_SPACING = PIN_SPACING * Math.sin(Math.PI / 3);
  const PIN_CENTER_OFFSET_X = -0.01;

  const PIN_OFFSETS = [
    { x: 0, z: 0 }, { x: -PIN_SPACING / 2, z: PIN_ROW_SPACING }, { x: PIN_SPACING / 2, z: PIN_ROW_SPACING },
    { x: -PIN_SPACING, z: 2 * PIN_ROW_SPACING }, { x: 0, z: 2 * PIN_ROW_SPACING }, { x: PIN_SPACING, z: 2 * PIN_ROW_SPACING },
    { x: -1.5 * PIN_SPACING, z: 3 * PIN_ROW_SPACING }, { x: -0.5 * PIN_SPACING, z: 3 * PIN_ROW_SPACING },
    { x: 0.5 * PIN_SPACING, z: 3 * PIN_ROW_SPACING }, { x: 1.5 * PIN_SPACING, z: 3 * PIN_ROW_SPACING }
  ];

  const container = document.getElementById('canvas-container');
  const canvas = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;

  function resize() {
    const rect = container.getBoundingClientRect();
    renderer.setSize(rect.width, rect.height, false);
    camera.aspect = rect.width / rect.height; camera.updateProjectionMatrix();
  }

  const scene = new THREE.Scene(); scene.background = new THREE.Color(0x111118); scene.fog = new THREE.Fog(0x111118, 25, 55);
  const camera = new THREE.PerspectiveCamera(45, 9 / 16, 0.1, 100);
  const cameraPos = new THREE.Vector3(0, 1.8, -2.5);
  const cameraLook = new THREE.Vector3(0, 0.4, 10);
  camera.position.copy(cameraPos); camera.lookAt(cameraLook);

  const ambient = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(4, 20, 10); dirLight.castShadow = true; dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.left = -6; dirLight.shadow.camera.right = 6; dirLight.shadow.camera.top = 25;
  dirLight.shadow.camera.bottom = -5; dirLight.shadow.camera.near = 0.1; dirLight.shadow.camera.far = 50;
  dirLight.shadow.bias = -0.001; scene.add(dirLight);

  const pinSpot = new THREE.PointLight(0xffffee, 0.9, 18); pinSpot.position.set(0, 5, FOUL_TO_HEAD_PIN + 0.5); scene.add(pinSpot);

  const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
  world.broadphase = new CANNON.SAPBroadphase(world); world.solver.iterations = 20;
  world.solver.tolerance = 0.0001; world.allowSleep = true;

  const laneMat = new CANNON.Material('lane'), ballMat = new CANNON.Material('ball'), pinMat = new CANNON.Material('pin');
  const gutterMat = new CANNON.Material('gutter'), wallMat = new CANNON.Material('wall'), backstopMat = new CANNON.Material('backstop');
  world.addContactMaterial(new CANNON.ContactMaterial(laneMat, ballMat, { friction: 0.05, restitution: 0.05 }));
  world.addContactMaterial(new CANNON.ContactMaterial(gutterMat, ballMat, { friction: 0.02, restitution: 0.1 }));
  world.addContactMaterial(new CANNON.ContactMaterial(ballMat, pinMat, { friction: 0.20, restitution: 0.30 }));
  world.addContactMaterial(new CANNON.ContactMaterial(pinMat, pinMat, { friction: 0.25, restitution: 0.20 }));
  world.addContactMaterial(new CANNON.ContactMaterial(pinMat, laneMat, { friction: 0.3, restitution: 0.15 }));
  world.addContactMaterial(new CANNON.ContactMaterial(wallMat, ballMat, { friction: 0.1, restitution: 0.3 }));
  world.addContactMaterial(new CANNON.ContactMaterial(wallMat, pinMat, { friction: 0.3, restitution: 0.25 }));
  world.addContactMaterial(new CANNON.ContactMaterial(backstopMat, ballMat, { friction: 0.1, restitution: 0.3 }));
  world.addContactMaterial(new CANNON.ContactMaterial(backstopMat, pinMat, { friction: 0.4, restitution: 0.2 }));

  function addStaticBox(size, pos, mat, visualMat, receiveShadow = true) {
    const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(size.x, size.y, size.z)), position: new CANNON.Vec3(pos.x, pos.y, pos.z), material: mat });
    world.addBody(body);
    if (visualMat) {
      const geom = new THREE.BoxGeometry(size.x * 2, size.y * 2, size.z * 2);
      const mesh = new THREE.Mesh(geom, visualMat); mesh.position.set(pos.x, pos.y, pos.z);
      mesh.receiveShadow = receiveShadow; mesh.castShadow = true; scene.add(mesh);
    }
    return body;
  }

  const laneVisualMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.3, metalness: 0.05 });
  const approachVisualMat = new THREE.MeshStandardMaterial({ color: 0xb8956a, roughness: 0.4 });
  const gutterVisualMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.9 });
  const pinDeckVisualMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.3, metalness: 0.05 });
  const wallVisualMat = new THREE.MeshStandardMaterial({ color: 0x222230, roughness: 0.8 });
  const foulLineMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.5 });
  const backstopMatVis = new THREE.MeshStandardMaterial({ color: 0x151520, roughness: 0.95 });
  const arrowMat = new THREE.MeshStandardMaterial({ color: 0x7a3e10, roughness: 0.6 });

  addStaticBox({ x: LANE_WIDTH / 2, y: 0.1, z: 2.25 }, { x: 0, y: -0.1, z: -2.25 }, laneMat, approachVisualMat);
  addStaticBox({ x: LANE_WIDTH / 2, y: 0.1, z: 9.144 }, { x: 0, y: -0.1, z: 9.144 }, laneMat, laneVisualMat);
  addStaticBox({ x: LANE_WIDTH / 2, y: 0.1, z: 5.0 }, { x: 0, y: -0.1, z: 21.0 }, laneMat, pinDeckVisualMat);
  addStaticBox({ x: LANE_WIDTH / 2, y: 0.002, z: 0.03 }, { x: 0, y: 0.002, z: 0 }, laneMat, foulLineMat);
  for (let i = -2; i <= 2; i++) { const a = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.12, 3), arrowMat); a.position.set(i * 0.15, 0.01, 4.5); a.rotation.x = -Math.PI / 2; a.rotation.z = Math.PI; scene.add(a); }

  const GUTTER_WIDTH = 0.23, GUTTER_DEPTH = 0.10, GUTTER_LENGTH = 26;
  addStaticBox({ x: GUTTER_WIDTH / 2, y: 0.05, z: GUTTER_LENGTH / 2 }, { x: -LANE_WIDTH / 2 - GUTTER_WIDTH / 2, y: -0.1 - GUTTER_DEPTH, z: 8 }, gutterMat, gutterVisualMat);
  addStaticBox({ x: GUTTER_WIDTH / 2, y: 0.05, z: GUTTER_LENGTH / 2 }, { x: LANE_WIDTH / 2 + GUTTER_WIDTH / 2, y: -0.1 - GUTTER_DEPTH, z: 8 }, gutterMat, gutterVisualMat);
  addStaticBox({ x: 0.05, y: 0.25, z: GUTTER_LENGTH / 2 }, { x: -LANE_WIDTH / 2 - GUTTER_WIDTH - 0.05, y: -0.05, z: 8 }, gutterMat, wallVisualMat);
  addStaticBox({ x: 0.05, y: 0.25, z: GUTTER_LENGTH / 2 }, { x: LANE_WIDTH / 2 + GUTTER_WIDTH + 0.05, y: -0.05, z: 8 }, gutterMat, wallVisualMat);
  addStaticBox({ x: 0.02, y: GUTTER_DEPTH / 2, z: GUTTER_LENGTH / 2 }, { x: -LANE_WIDTH / 2 - 0.01, y: -0.1 - GUTTER_DEPTH / 2, z: 8 }, gutterMat, null);
  addStaticBox({ x: 0.02, y: GUTTER_DEPTH / 2, z: GUTTER_LENGTH / 2 }, { x: LANE_WIDTH / 2 + 0.01, y: -0.1 - GUTTER_DEPTH / 2, z: 8 }, gutterMat, null);
  addStaticBox({ x: LANE_WIDTH / 2 + GUTTER_WIDTH + 0.4, y: 1.0, z: 0.15 }, { x: 0, y: 0.9, z: 25 }, backstopMat, backstopMatVis);
  addStaticBox({ x: LANE_WIDTH / 2, y: 0.5, z: 0.08 }, { x: 0, y: 0.4, z: 24.7 }, backstopMat, new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.95 }));
  addStaticBox({ x: 30, y: 0.1, z: 50 }, { x: 0, y: -3, z: 15 }, wallMat, null);

  function createPinMesh() {
    const g = new THREE.Group(); const w = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 }), r = new THREE.MeshStandardMaterial({ color: 0xcc0000 }), o = -PIN_HEIGHT / 2;
    const b = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.052, 0.04, 16), w); b.position.y = 0.02 + o; b.castShadow = true; b.receiveShadow = true; g.add(b);
    const be = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.0605, 0.12, 16), w); be.position.y = 0.10 + o; be.castShadow = true; g.add(be);
    const t = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.055, 0.10, 16), w); t.position.y = 0.21 + o; t.castShadow = true; g.add(t);
    const n = new THREE.Mesh(new THREE.CylinderGeometry(0.030, 0.035, 0.06, 16), w); n.position.y = 0.29 + o; n.castShadow = true; g.add(n);
    const s1 = new THREE.Mesh(new THREE.CylinderGeometry(0.0325, 0.0325, 0.008, 16), r); s1.position.y = 0.27 + o; g.add(s1);
    const s2 = new THREE.Mesh(new THREE.CylinderGeometry(0.0325, 0.0325, 0.008, 16), r); s2.position.y = 0.31 + o; g.add(s2);
    const h = new THREE.Mesh(new THREE.SphereGeometry(0.042, 16, 16), w); h.position.y = 0.35 + o; h.castShadow = true; g.add(h);
    return g;
  }
  function createPinBody(x, y, z) {
    const body = new CANNON.Body({ mass: PIN_MASS, shape: new CANNON.Cylinder(0.04, 0.06, PIN_HEIGHT, 10), position: new CANNON.Vec3(x, PIN_HEIGHT / 2, z), material: pinMat, linearDamping: 0.05, angularDamping: 0.15 });
    body.originalPosition = new CANNON.Vec3(x, PIN_HEIGHT / 2, z); return body;
  }
  function createBallMesh() {
    const g = new THREE.Group(); const bMat = new THREE.MeshStandardMaterial({ color: 0x9933ff, roughness: 0.1, metalness: 0.3, emissive: 0x220044, emissiveIntensity: 0.3 });
    const ball = new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS, 32, 32), bMat); ball.castShadow = false; g.add(ball);
    const holeMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.95 }); const holeGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.025, 16);
    function addHole(x, y, z) { const h = new THREE.Mesh(holeGeo, holeMat); const d = new THREE.Vector3(x, y, z).normalize(); h.position.copy(d.clone().multiplyScalar(BALL_RADIUS - 0.012)); h.lookAt(new THREE.Vector3(0, 0, 0)); g.add(h); }
    addHole(0.035, 0.04, 0.95); addHole(-0.035, 0.04, 0.95); addHole(0, -0.045, 0.95); return g;
  }

  const ballMesh = createBallMesh(); scene.add(ballMesh);
  const ballBody = new CANNON.Body({ mass: BALL_MASS, shape: new CANNON.Sphere(BALL_RADIUS), position: new CANNON.Vec3(0, BALL_RADIUS + 0.01, -0.3), material: ballMat, linearDamping: 0.01, angularDamping: 0.02 });
  world.addBody(ballBody);

  const aimLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 15)]), new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.6 }));
  aimLine.visible = false; scene.add(aimLine);

  let pins = [];

  function resetPins() {
    for (const p of pins) { world.removeBody(p.body); scene.remove(p.mesh); }
    pins = []; const hz = FOUL_TO_HEAD_PIN;
    for (const o of PIN_OFFSETS) { const m = createPinMesh(); const b = createPinBody(o.x + PIN_CENTER_OFFSET_X, 0, hz + o.z); world.addBody(b); scene.add(m); pins.push({ mesh: m, body: b }); }
  }
  function resetBall() {
    world.removeBody(ballBody); ballBody.position.set(0, BALL_RADIUS + 0.01, -0.3); ballBody.velocity.setZero(); ballBody.angularVelocity.setZero();
    ballBody.quaternion.set(0, 0, 0, 1); ballBody.linearDamping = 0.01; ballBody.angularDamping = 0.02;
    ballBody.mass = BALL_MASS; ballBody.updateMassProperties(); ballBody.type = CANNON.Body.DYNAMIC;
    world.addBody(ballBody); ballBody.wakeUp();
    ballMesh.visible = true; ballMesh.position.set(0, BALL_RADIUS + 0.01, -0.3); ballMesh.quaternion.set(0, 0, 0, 1);
  }
  function isPinStanding(pin) {
    const lu = new CANNON.Vec3(0, 1, 0); const wu = new CANNON.Vec3(); pin.body.quaternion.vmult(lu, wu);
    const op = pin.body.originalPosition; const dist = Math.sqrt(Math.pow(pin.body.position.x - op.x, 2) + Math.pow(pin.body.position.z - op.z, 2));
    return wu.y > 0.7 && pin.body.position.y > 0.05 && dist < 0.15;
  }
  function countStandingPins() { let n = 0; for (const p of pins) if (isPinStanding(p)) n++; return n; }
  function removeFallenPins() { for (let i = pins.length - 1; i >= 0; i--) { if (!isPinStanding(pins[i])) { world.removeBody(pins[i].body); scene.remove(pins[i].mesh); pins.splice(i, 1); } } }

  function updateScoreboard() {
    const sb = document.getElementById('scoreboard');
    let html = '<div class="frame-row">';
    for (let f = 0; f < 10; f++) {
      const isCurrent = f === 0 && gameState.phase !== 'FRAME_DONE';
      const r = f === 0 ? gameState.rolls : [];
      html += `<div class="frame ${f === 9 ? 'tenth' : ''} ${isCurrent ? 'current' : ''}"><div class="frame-label">${f + 1}</div><div class="frame-rolls">`;
      if (f > 0) html += '<span></span><span></span>';
      else {
        if (r[0] === undefined) html += '<span></span><span></span>';
        else if (r[0] === 10) html += '<span>X</span><span></span>';
        else { html += `<span>${r[0] === 0 ? '-' : r[0]}</span>`; html += (r[1] !== undefined) ? (r[0] + r[1] === 10 ? '<span>/</span>' : `<span>${r[1] === 0 ? '-' : r[1]}</span>`) : '<span></span>'; }
      }
      html += `</div><div class="frame-score"></div></div>`;
    }
    sb.innerHTML = html + '</div>';
  }

  function updateInfo() {
    document.getElementById('info').textContent = gameState.phase === 'FRAME_DONE' ? 'Фрейм завершён!' : `Фрейм 1 • Бросок ${gameState.currentRollInFrame + 1}`;
  }

  function showMessage(text) { const m = document.getElementById('message'); m.textContent = text; m.classList.add('show'); setTimeout(() => m.classList.remove('show'), 2000); }

  function showFrameOver(r1, r2, r3) {
    gameState.phase = 'FRAME_DONE';
    let rt = '', dt = '';
    if (r1 === 10) { rt = 'СТРАЙК! 🎯'; dt = '10 кеглей'; }
    else if (r1 + r2 === 10) { rt = 'СПЭР! 🔄'; dt = `${r1} + ${r2} = 10`; }
    else { rt = `${r1 + r2} кеглей`; dt = `${r1} + ${r2}`; }
    document.getElementById('frame-result-text').textContent = rt;
    document.getElementById('frame-detail-text').textContent = dt;
    document.getElementById('frame-over').classList.add('show');
  }

  function onRollComplete() {
    const standing = countStandingPins();
    const knocked = Math.max(0, gameState.pinsStandingBeforeRoll - standing);
    gameState.rolls.push(knocked);
    const ri = gameState.currentRollInFrame;

    if (ri === 0) {
      if (knocked === 10) { showMessage('СТРАЙК!'); showFrameOver(10, 0, 0); return; }
      else { gameState.currentRollInFrame = 1; gameState.pinsStandingBeforeRoll = standing; gameState.needsPinReset = false; }
    } else if (ri === 1) {
      if (standing === 0) showMessage('СПЭР!');
      showFrameOver(gameState.rolls[0], knocked, 0); return;
    }

    removeFallenPins();
    if (gameState.needsPinReset) { resetPins(); gameState.pinsStandingBeforeRoll = 10; }
    else { gameState.pinsStandingBeforeRoll = standing; }
    resetBall(); gameState.phase = 'AIMING'; updateScoreboard(); updateInfo();
  }

  let touchStart = null, currentTouch = null, aimAngle = 0, throwPower = 0;

  function getCanvasCoords(e) { const r = canvas.getBoundingClientRect(); const p = e.touches ? e.touches[0] : e; return { x: p.clientX - r.left, y: p.clientY - r.top }; }
  function onPointerDown(e) { if (gameState.phase !== 'AIMING') return; e.preventDefault(); const c = getCanvasCoords(e); touchStart = { x: c.x, y: c.y }; currentTouch = { x: c.x, y: c.y }; document.getElementById('power-meter').classList.add('active'); }
  function onPointerMove(e) { if (!touchStart) return; e.preventDefault(); const c = getCanvasCoords(e); currentTouch = { x: c.x, y: c.y }; const dx = currentTouch.x - touchStart.x, dy = currentTouch.y - touchStart.y; aimAngle = Math.max(-0.4, Math.min(0.4, -dx * 0.003)); throwPower = Math.max(0, Math.min(1, -dy / 250)); document.getElementById('power-fill').style.height = (throwPower * 100) + '%'; aimLine.visible = true; aimLine.position.set(ballBody.position.x, 0.02, ballBody.position.z); aimLine.rotation.y = aimAngle; }
  function onPointerUp(e) { if (!touchStart) return; e.preventDefault(); document.getElementById('power-meter').classList.remove('active'); aimLine.visible = false; if (throwPower > 0.05) throwBall(); touchStart = null; currentTouch = null; aimAngle = 0; throwPower = 0; document.getElementById('power-fill').style.height = '0%'; }
  function throwBall() { const v = 5 + throwPower * 15; const im = BALL_MASS * v; const dx = Math.sin(aimAngle), dz = Math.cos(aimAngle); ballBody.applyImpulse(new CANNON.Vec3(dx * im, 0, dz * im), ballBody.position); const omega = 10 + throwPower * 20; ballBody.angularVelocity.set(-dz * omega, 0, dx * omega); ballBody.wakeUp(); gameState.phase = 'ROLLING'; gameState.settleTimer = 0; gameState.rollTimer = 0; }

  canvas.addEventListener('touchstart', onPointerDown, { passive: false }); canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false }); canvas.addEventListener('touchcancel', onPointerUp, { passive: false });
  canvas.addEventListener('mousedown', onPointerDown); canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp); canvas.addEventListener('mouseleave', onPointerUp);

  // Camera settings
  const camSettings = { height: 1.8, backOffset: -2.5, tiltAngle: -15, fov: 45, mode: 'aim' };
  const settingsPanel = document.getElementById('camera-settings-panel');
  document.getElementById('camera-settings-btn').addEventListener('click', () => settingsPanel.classList.toggle('show'));
  const slH = document.getElementById('cam-height'), slB = document.getElementById('cam-back'), slT = document.getElementById('cam-tilt'), slF = document.getElementById('cam-fov');
  const vH = document.getElementById('val-height'), vB = document.getElementById('val-back'), vT = document.getElementById('val-tilt'), vF = document.getElementById('val-fov');
  function updCam() { camSettings.height = parseFloat(slH.value); camSettings.backOffset = parseFloat(slB.value); camSettings.tiltAngle = parseFloat(slT.value); camSettings.fov = parseFloat(slF.value); vH.textContent = camSettings.height.toFixed(1); vB.textContent = camSettings.backOffset.toFixed(1); vT.textContent = camSettings.tiltAngle; vF.textContent = camSettings.fov; camera.fov = camSettings.fov; camera.updateProjectionMatrix(); }
  slH.addEventListener('input', updCam); slB.addEventListener('input', updCam); slT.addEventListener('input', updCam); slF.addEventListener('input', updCam);
  document.getElementById('mode-aim').addEventListener('click', () => { camSettings.mode = 'aim'; document.querySelectorAll('.camera-mode-btns button').forEach(b => b.classList.remove('active')); document.getElementById('mode-aim').classList.add('active'); });
  document.getElementById('mode-roll').addEventListener('click', () => { camSettings.mode = 'roll'; document.querySelectorAll('.camera-mode-btns button').forEach(b => b.classList.remove('active')); document.getElementById('mode-roll').classList.add('active'); });
  document.getElementById('mode-lock').addEventListener('click', () => { camSettings.mode = 'lock'; document.querySelectorAll('.camera-mode-btns button').forEach(b => b.classList.remove('active')); document.getElementById('mode-lock').classList.add('active'); });

  const clock = new THREE.Clock();

  function updateCamera(dt) {
    const bp = ballBody.position; const lockDist = FOUL_TO_HEAD_PIN * 0.75;
    const tr = camSettings.tiltAngle * Math.PI / 180; const ld = 10; const ly = Math.sin(tr) * ld + 0.3; const lz = Math.cos(tr) * ld;
    let tp, tl;
    if (gameState.phase === 'AIMING') { tp = new THREE.Vector3(0, camSettings.height, camSettings.backOffset); tl = new THREE.Vector3(0, ly, lz); }
    else if (gameState.phase === 'ROLLING' || gameState.phase === 'SETTLING') {
      if (camSettings.mode === 'lock' || bp.z > lockDist) { tp = new THREE.Vector3(0, camSettings.height, FOUL_TO_HEAD_PIN - 3); tl = new THREE.Vector3(PIN_CENTER_OFFSET_X, 0.2, FOUL_TO_HEAD_PIN + 0.5); }
      else if (camSettings.mode === 'roll') { tp = new THREE.Vector3(bp.x * 0.3, camSettings.height, Math.max(bp.z - 4.5, camSettings.backOffset)); tl = new THREE.Vector3(bp.x * 0.4, 0.3, bp.z + 8); }
      else { tp = new THREE.Vector3(bp.x * 0.3, camSettings.height, Math.max(bp.z - 4.5, camSettings.backOffset)); tl = new THREE.Vector3(bp.x * 0.4, ly, bp.z + 8); }
    } else { tp = new THREE.Vector3(0, camSettings.height, camSettings.backOffset); tl = new THREE.Vector3(0, ly, lz); }
    cameraPos.lerp(tp, 0.05); cameraLook.lerp(tl, 0.05); camera.position.copy(cameraPos); camera.lookAt(cameraLook);
  }

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 1 / 30); world.step(1 / 60, dt, 3);
    for (const p of pins) { p.mesh.position.set(p.body.position.x, p.body.position.y, p.body.position.z); p.mesh.quaternion.set(p.body.quaternion.x, p.body.quaternion.y, p.body.quaternion.z, p.body.quaternion.w); }
    ballMesh.position.set(ballBody.position.x, ballBody.position.y, ballBody.position.z);
    ballMesh.quaternion.set(ballBody.quaternion.x, ballBody.quaternion.y, ballBody.quaternion.z, ballBody.quaternion.w);
    if (gameState.phase === 'ROLLING') { gameState.rollTimer += dt; if (ballBody.position.y < -1) { ballBody.position.y = BALL_RADIUS; ballBody.velocity.y = 0; } if (gameState.rollTimer >= 3.0 || ballBody.position.y < -0.5 || ballBody.position.z > 25) { gameState.phase = 'SETTLING'; gameState.settleTimer = 0; } }
    else if (gameState.phase === 'SETTLING') { gameState.settleTimer += dt; if (gameState.settleTimer > 0.5) onRollComplete(); }
    updateCamera(dt); renderer.render(scene, camera);
  }

  resize(); init(); animate();
</script>
</body>
</html>
