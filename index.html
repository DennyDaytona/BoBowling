<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Telegram Bowling</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  body { width: 100vw; height: 100vh; overflow: hidden; background: #111; font-family: -apple-system, sans-serif; }
  #canvas-container { position: relative; width: 100%; height: 100%; }
  canvas { display: block; width: 100%; height: 100%; }
  
  #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  #scoreboard { position: absolute; top: 8px; left: 8px; right: 8px; background: rgba(0,0,0,0.8); color: #fff; padding: 8px; border-radius: 8px; font-size: 12px; pointer-events: auto; text-align: center; }
  #info { position: absolute; top: 60px; left: 8px; color: #ffd700; font-size: 14px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 6px; }
  #message { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 42px; font-weight: 900; text-shadow: 0 0 20px rgba(255,215,0,0.9); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  #message.show { opacity: 1; }
  
  #waiting-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none;
    flex-direction: column; align-items: center; justify-content: center;
    color: #fff; z-index: 100; backdrop-filter: blur(8px); text-align: center; padding: 20px;
  }
  #waiting-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #ffd700; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  #power-meter { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 20px; height: 200px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.5); border-radius: 10px; overflow: hidden; opacity: 0; transition: opacity 0.2s; }
  #power-meter.active { opacity: 1; }
  #power-fill { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #00cc44, #ffcc00, #ff3300); height: 0%; }
  #instructions { position: absolute; bottom: 20px; right: 16px; color: rgba(255,255,255,0.8); font-size: 12px; text-align: right; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 6px; pointer-events: auto; }

  #debug-console {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0, 0, 0, 0.9);
    color: #00ff00;
    font-family: monospace;
    font-size: 10px;
    padding: 5px;
    max-height: 120px;
    overflow-y: auto;
    z-index: 9999;
    border-top: 1px solid #333;
    pointer-events: auto;
  }
  #debug-console div { margin-bottom: 2px; word-wrap: break-word; }
  #debug-console .error { color: #ff4444; }
  #debug-console .warn { color: #ffcc00; }
</style>
</head>
<body>
<div id="canvas-container">
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="scoreboard">Фрейм 1 • Бросок 1</div>
    <div id="info">Ваш ход</div>
    <div id="power-meter"><div id="power-fill"></div></div>
    <div id="message"></div>
    <div id="instructions">Тяните ВВЕРХ для силы<br>ВЛЕКО/ВПРАВО для прицела</div>
  </div>
  <div id="waiting-overlay">
    <div class="spinner"></div>
    <div id="waiting-text">Сейчас не ваш ход.</div>
    <div style="margin-top: 10px; font-size: 14px; opacity: 0.7;">Закройте это окно и дождитесь своей ссылки в чате.</div>
  </div>
</div>

<div id="debug-console"></div>

<script type="module">
  import * as THREE from 'three';
  import * as CANNON from 'cannon-es';

  // ==========================================
  // 0. ВСТРОЕННАЯ КОНСОЛЬ ОТЛАДКИ
  // ==========================================
  const debugDiv = document.getElementById('debug-console');
  function log(msg, type = 'info') {
    const div = document.createElement('div');
    div.className = type;
    div.textContent = `> ${msg}`;
    debugDiv.appendChild(div);
    debugDiv.scrollTop = debugDiv.scrollHeight;
    console.log(msg);
  }
  log("Mini App запущен");

  // ==========================================
  // 1. ИНИЦИАЛИЗАЦИЯ TELEGRAM И ПРОВЕРКА ХОДА
  // ==========================================
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  log("Telegram WebApp готов");

  // Читаем параметры из HASH (#game=...&player=...)
  const hashParams = new URLSearchParams(window.location.hash.substring(1));
  const gameId = hashParams.get('game');
  const expectedPlayerId = parseInt(hashParams.get('player'));
  const currentFrameNum = parseInt(hashParams.get('frame'));
  const p1Score = parseInt(hashParams.get('p1_score'));
  const p2Score = parseInt(hashParams.get('p2_score'));
  
  let isMyTurn = false;
  let opponentTotal = 0;

  log(`Hash: ${window.location.hash}`);
  log(`Game ID: ${gameId || 'НЕ НАЙДЕН'}`);
  log(`Expected Player ID: ${expectedPlayerId || 'НЕ НАЙДЕН'}`);
  log(`Frame: ${currentFrameNum || '1'}`);

  const gameState = {
    frames: Array(10).fill(null).map(() => ({ rolls: [] })),
    currentFrame: 0,
    phase: 'WAITING',
    rollTimer: 0
  };

  if (gameId && expectedPlayerId) {
    gameState.currentFrame = currentFrameNum - 1;
    
    const myUserId = tg.initDataUnsafe?.user?.id;
    log(`My User ID: ${myUserId}`);
    
    opponentTotal = (myUserId === expectedPlayerId) ? p2Score : p1Score;
    
    if (myUserId === expectedPlayerId) {
      isMyTurn = true;
      gameState.phase = 'AIMING';
      log("ХОД ПОДТВЕРЖДЕН. Игра активна.");
    } else {
      isMyTurn = false;
      log(`БЛОКИРОВКА: Мой ID (${myUserId}) не совпадает с ожидаемым (${expectedPlayerId})`, "warn");
      document.getElementById('waiting-overlay').classList.add('show');
      document.getElementById('canvas').style.pointerEvents = 'none';
    }
  } else {
    log("ОШИБКА: Параметры игры не найдены в URL", "error");
    document.getElementById('waiting-overlay').classList.add('show');
    document.getElementById('waiting-text').textContent = "Ошибка: неверная ссылка";
    document.getElementById('canvas').style.pointerEvents = 'none';
  }

  // ==========================================
  // 2. ЛОГИКА ИГРЫ И СОСТОЯНИЕ
  // ==========================================
  function isFrameComplete(frameIndex) {
    const rolls = gameState.frames[frameIndex].rolls;
    if (frameIndex < 9) return rolls.length === 1 && rolls[0] === 10 ? true : rolls.length === 2;
    if (rolls.length === 3) return true;
    if (rolls.length === 2) return rolls[0] !== 10 && (rolls[0] + rolls[1]) !== 10;
    return false;
  }

  function calculateTotalScore() {
    const rolls = gameState.frames.flatMap(f => f.rolls);
    let rollIndex = 0, cumulative = 0;
    const getRoll = (i) => rolls[i] !== undefined ? rolls[i] : null;

    for (let frame = 0; frame < 10; frame++) {
      if (frame < 9) {
        const first = getRoll(rollIndex);
        if (first === null) break;
        if (first === 10) {
          const b1 = getRoll(rollIndex + 1), b2 = getRoll(rollIndex + 2);
          if (b1 === null || b2 === null) break;
          cumulative += 10 + b1 + b2; rollIndex += 1;
        } else {
          const second = getRoll(rollIndex + 1);
          if (second === null) break;
          if (first + second === 10) {
            const bonus = getRoll(rollIndex + 2);
            if (bonus === null) break;
            cumulative += 10 + bonus;
          } else { cumulative += first + second; }
          rollIndex += 2;
        }
      } else {
        const first = getRoll(rollIndex);
        if (first === null) break;
        let frameScore = 0;
        if (first === 10) {
          const s = getRoll(rollIndex + 1), t = getRoll(rollIndex + 2);
          if (s === null || t === null) break;
          frameScore = 10 + s + t;
        } else {
          const second = getRoll(rollIndex + 1);
          if (second === null) break;
          if (first + second === 10) {
            const bonus = getRoll(rollIndex + 2);
            if (bonus === null) break;
            frameScore = 10 + bonus;
          } else { frameScore = first + second; }
        }
        cumulative += frameScore; break;
      }
    }
    if (cumulative === 0 && rolls.length > 0) return rolls.reduce((a, b) => a + b, 0);
    return cumulative;
  }

  function sendDataAndClose() {
    const rolls = gameState.frames[gameState.currentFrame].rolls;
    const frameScore = rolls.reduce((a, b) => a + b, 0);
    const newTotal = calculateTotalScore();
    const isLast = gameState.currentFrame === 9 && isFrameComplete(9);

    log(`=== ПОДГОТОВКА К ОТПРАВКЕ ===`);
    log(`Фрейм: ${gameState.currentFrame}, Броски: ${rolls.join(',')}, Последний: ${isLast}`);

    const myUserId = tg.initDataUnsafe?.user?.id;
    let payload = {};
    
    if (isLast) {
      const isPlayer1 = (myUserId === expectedPlayerId);
      payload = { 
        action: "game_end", 
        game_id: gameId, 
        player_id: myUserId, 
        winner_id: myUserId, 
        p1_final: isPlayer1 ? newTotal : p2Score, 
        p2_final: isPlayer1 ? p1Score : newTotal
      };
    } else {
      payload = { 
        action: "frame_update", 
        game_id: gameId, 
        player_id: myUserId, 
        frame: gameState.currentFrame + 1, 
        frame_score: frameScore, 
        total_score: newTotal 
      };
    }

    const jsonPayload = JSON.stringify(payload);
    log(`ОТПРАВЛЯЕМ PAYLOAD: ${jsonPayload}`);
    
    try {
      tg.sendData(jsonPayload);
      log("sendData вызван успешно. Закрываем...");
      tg.close();
    } catch (e) {
      log(`ОШИБКА sendData: ${e}`, "error");
    }
  }

  // ==========================================
  // 3. 3D ФИЗИКА И РЕНДЕРИНГ
  // ==========================================
  const canvas = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111118);
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.8, -2.5);
  camera.lookAt(0, 0.4, 10);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(4, 20, 10); dirLight.castShadow = true;
  scene.add(dirLight);

  const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
  const laneMat = new CANNON.Material(), ballMat = new CANNON.Material(), pinMat = new CANNON.Material();
  world.addContactMaterial(new CANNON.ContactMaterial(laneMat, ballMat, { friction: 0.05, restitution: 0.05 }));
  world.addContactMaterial(new CANNON.ContactMaterial(ballMat, pinMat, { friction: 0.2, restitution: 0.3 }));

  const laneBody = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(0.53, 0.1, 15)), material: laneMat });
  laneBody.position.set(0, -0.1, 10); world.addBody(laneBody);
  const laneMesh = new THREE.Mesh(new THREE.BoxGeometry(1.06, 0.2, 30), new THREE.MeshStandardMaterial({ color: 0xd4a574 }));
  laneMesh.position.copy(laneBody.position); laneMesh.receiveShadow = true; scene.add(laneMesh);

  const ballBody = new CANNON.Body({ mass: 7.2, shape: new CANNON.Sphere(0.11), material: ballMat, position: new CANNON.Vec3(0, 0.12, -0.3) });
  world.addBody(ballBody);
  const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(0.11, 32, 32), new THREE.MeshStandardMaterial({ color: 0x9933ff, roughness: 0.1 }));
  ballMesh.castShadow = true; scene.add(ballMesh);

  let pins = [];
  const PIN_OFFSETS = [{x:0,z:0}, {x:-0.15,z:0.26}, {x:0.15,z:0.26}, {x:-0.3,z:0.52}, {x:0,z:0.52}, {x:0.3,z:0.52}, {x:-0.45,z:0.78}, {x:-0.15,z:0.78}, {x:0.15,z:0.78}, {x:0.45,z:0.78}];
  function resetPins() {
    pins.forEach(p => { world.removeBody(p.body); scene.remove(p.mesh); });
    pins = [];
    PIN_OFFSETS.forEach(off => {
      const body = new CANNON.Body({ mass: 0.75, shape: new CANNON.Cylinder(0.04, 0.06, 0.38, 8), material: pinMat, position: new CANNON.Vec3(off.x, 0.19, 15 + off.z) });
      world.addBody(body);
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.38, 8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
      mesh.castShadow = true; scene.add(mesh);
      pins.push({ body, mesh });
    });
  }
  resetPins();

  function isPinStanding(pin) {
    return pin.body.position.y > 0.05;
  }

  // ==========================================
  // 4. УПРАВЛЕНИЕ И ИГРОВОЙ ЦИКЛ
  // ==========================================
  let touchStart = null, aimAngle = 0, throwPower = 0;
  
  function onPointerDown(e) {
    if (gameState.phase !== 'AIMING' || !isMyTurn) return;
    e.preventDefault();
    touchStart = { x: e.touches ? e.touches[0].clientX : e.clientX, y: e.touches ? e.touches[0].clientY : e.clientY };
    document.getElementById('power-meter').classList.add('active');
  }

  function onPointerMove(e) {
    if (!touchStart || !isMyTurn) return;
    e.preventDefault();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    aimAngle = Math.max(-0.4, Math.min(0.4, -(cx - touchStart.x) * 0.003));
    throwPower = Math.max(0, Math.min(1, -(cy - touchStart.y) / 250));
    document.getElementById('power-fill').style.height = (throwPower * 100) + '%';
  }

  function onPointerUp(e) {
    if (!touchStart || !isMyTurn) return;
    e.preventDefault();
    document.getElementById('power-meter').classList.remove('active');
    if (throwPower > 0.05) {
      const v = 5 + throwPower * 15;
      const impulse = 7.2 * v;
      ballBody.applyImpulse(new CANNON.Vec3(Math.sin(aimAngle) * impulse, 0, Math.cos(aimAngle) * impulse), ballBody.position);
      gameState.phase = 'ROLLING'; gameState.rollTimer = 0;
      log("Бросок выполнен!");
    }
    touchStart = null; throwPower = 0;
    document.getElementById('power-fill').style.height = '0%';
  }

  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false });
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);

  function animate() {
    requestAnimationFrame(animate);
    world.step(1/60);

    ballMesh.position.copy(ballBody.position);
    ballMesh.quaternion.copy(ballBody.quaternion);
    pins.forEach(p => { p.mesh.position.copy(p.body.position); p.mesh.quaternion.copy(p.body.quaternion); });

    if (gameState.phase === 'ROLLING') {
      gameState.rollTimer += 1/60;
      const standing = pins.filter(isPinStanding).length;
      const ballStopped = ballBody.velocity.length() < 0.1 || ballBody.position.z > 20 || ballBody.position.y < -0.5;
      
      if (ballStopped || gameState.rollTimer > 4) {
        const knocked = 10 - standing;
        log(`Бросок завершен. Сбито кеглей: ${knocked}`);
        gameState.frames[gameState.currentFrame].rolls.push(knocked);
        
        const msg = document.getElementById('message');
        msg.textContent = knocked === 10 ? 'СТРАЙК!' : (gameState.frames[gameState.currentFrame].rolls.length === 2 && (gameState.frames[gameState.currentFrame].rolls[0] + knocked === 10)) ? 'СПЛИТ!' : `${knocked} кеглей`;
        msg.classList.add('show');
        
        setTimeout(() => {
          if (isFrameComplete(gameState.currentFrame)) {
            log("Фрейм завершен. Отправка данных...");
            sendDataAndClose();
          } else {
            log("Сброс шара для следующего броска...");
            ballBody.position.set(0, 0.12, -0.3);
            ballBody.velocity.setZero(); ballBody.angularVelocity.setZero();
            gameState.phase = 'AIMING';
            msg.classList.remove('show');
          }
        }, 1500);
        gameState.phase = 'SETTLING';
      }
    }
    renderer.render(scene, camera);
  }
  
  document.getElementById('info').textContent = isMyTurn ? `Фрейм ${gameState.currentFrame + 1} • Ваш ход` : 'Ожидание...';
  animate();
</script>
</body>
</html>
